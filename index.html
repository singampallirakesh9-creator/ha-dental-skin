<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HA Dental & Skin Corner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#fff;
color:#222;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
box-shadow:0 5px 15px rgba(0,0,0,.08);
z-index:999;
}

.logo{
font-size:28px;
font-weight:700;
color:#ff4f87;
}

nav a{
text-decoration:none;
margin-left:25px;
font-weight:600;
color:#333;
}

.hero{
height:100vh;
background:linear-gradient(rgba(255,255,255,.45),rgba(255,255,255,.55)),
url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=1600');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content{
max-width:800px;
}

.hero h1{
font-size:60px;
color:#222;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#555;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:16px 35px;
background:#ff4f87;
color:#fff;
text-decoration:none;
border-radius:50px;
margin:10px;
font-weight:600;
transition:.3s;
}

.btn:hover{
background:#e63f77;
transform:translateY(-3px);
}

section{
padding:100px 8%;
}

.title{
font-size:45px;
text-align:center;
margin-bottom:60px;
color:#222;
}

.about{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
}

.about img{
width:100%;
border-radius:20px;
}

.about h2{
font-size:40px;
margin-bottom:20px;
}

.about p{
font-size:19px;
line-height:1.8;
color:#666;
}
